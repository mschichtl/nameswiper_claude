<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}NameSwiper{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <style>
    body { background: #f5f5f5; }
    .navbar-brand { font-weight: 700; letter-spacing: -0.5px; }
    .sex-filter .btn { font-size: 1rem; line-height: 1; padding: 0.25rem 0.6rem; }
    .sex-filter .btn.active-filter { background: rgba(255,255,255,0.3); }
    {% block extra_css %}{% endblock %}
  </style>
</head>
<body>

{% if user.is_authenticated %}
<nav class="navbar navbar-expand-sm navbar-dark bg-primary">
  <div class="container-fluid px-3">
    <a class="navbar-brand" href="{% url 'swipe' %}">NameSwiper</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link{% if request.resolver_match.url_name == 'swipe' %} active{% endif %}" href="{% url 'swipe' %}">Swipe</a>
        </li>
        <li class="nav-item">
          <a class="nav-link{% if request.resolver_match.url_name == 'swipe_history' %} active{% endif %}" href="{% url 'swipe_history' %}">History</a>
        </li>
        <li class="nav-item">
          <a class="nav-link{% if 'group' in request.resolver_match.url_name %} active{% endif %}" href="{% url 'group_list' %}">Groups</a>
        </li>
      </ul>
      <div class="d-flex align-items-center gap-2 mt-2 mt-sm-0">
        <div class="sex-filter btn-group btn-group-sm">
          <button class="btn btn-outline-light" id="filter-all" onclick="setSexFilter('')">All</button>
          <button class="btn btn-outline-light" id="filter-m" onclick="setSexFilter('M')">♂</button>
          <button class="btn btn-outline-light" id="filter-f" onclick="setSexFilter('F')">♀</button>
        </div>
        <span class="text-light small d-none d-sm-inline">{{ user.username }}</span>
        <a href="{% url 'logout' %}" class="btn btn-outline-light btn-sm">Logout</a>
      </div>
    </div>
  </div>
</nav>
{% endif %}

{% if messages %}
<div class="container mt-3">
  {% for message in messages %}
  <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %} alert-dismissible fade show" role="alert">
    {{ message }}
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>
  {% endfor %}
</div>
{% endif %}

<main class="container py-4">
  {% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  function setSexFilter(sex) {
    const url = new URL(window.location.href);
    if (sex) url.searchParams.set('sex', sex);
    else url.searchParams.delete('sex');
    window.location.href = url.toString();
  }

  const currentSex = new URLSearchParams(window.location.search).get('sex') || '';
  if (!currentSex) document.getElementById('filter-all')?.classList.add('active-filter');
  if (currentSex === 'M') document.getElementById('filter-m')?.classList.add('active-filter');
  if (currentSex === 'F') document.getElementById('filter-f')?.classList.add('active-filter');
</script>
{% block extra_js %}{% endblock %}
</body>
</html>
